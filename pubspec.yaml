name: cacao_apps
description: "AI-powered Cacao disease detection and farm management."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  dio: ^5.4.3
  flutter_secure_storage: ^10.0.0
  shimmer: ^3.0.0
  youtube_player_flutter: ^9.1.3
  camera: ^0.12.0
  permission_handler: ^12.0.1
  flutter_map: ^8.2.2 
  latlong2: ^0.9.0
  showcaseview: ^5.0.1
  smooth_page_indicator: ^2.0.1 
  shared_preferences: ^2.2.2 
  google_fonts: ^8.0.2
  http: ^1.6.0
  geolocator: ^14.0.2
  tflite_flutter: ^0.12.1
  image: ^4.1.7
  image_picker: ^1.0.7
  sqflite: ^2.3.2
  path: ^1.9.0
  path_provider: ^2.1.2
  uuid: ^4.3.3
  connectivity_plus: ^7.0.0
  flutter_local_notifications: ^21.0.0
  flutter_timezone: ^5.0.1
  timezone: ^0.11.0
  intl: ^0.20.2


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/theobrotect.png"

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/models/
    - assets/data/
    - assets/images/1.png
    - assets/images/2.png
    - assets/images/3.png
    - assets/images/theobrotect.png